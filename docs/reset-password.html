<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IEABank · Reset password</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #54565A;
    }

    .card {
      max-width: 420px;
      margin: 90px auto;
      padding: 32px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    h1 {
      margin-top: 0;
      font-size: 1.45rem;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 11px;
      border: 0;
      border-radius: 6px;
      background: #E2231A;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      opacity: .6;
      cursor: default;
    }

    #message {
      margin-top: 18px;
      text-align: center;
      line-height: 1.4;
    }

    .error {
      color: #b00020;
    }

    .success {
      color: #16753a;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>IEABank Portal</h1>
    <p>Choose a new password for your account.</p>

    <form id="reset-form">
      <label for="password">New password</label>
      <input id="password" type="password" minlength="8" required>

      <label for="password-confirm">Confirm new password</label>
      <input id="password-confirm" type="password" minlength="8" required>

      <button id="submit-btn" type="submit">Update password</button>
    </form>

    <div id="message"></div>
  </main>

  <script>
    const SUPABASE_URL = "https://ejmtcftpafwhgjbdgajh.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_VarHbYpEIhc7lJ07Up-Idg_pPduzoI7";

    const params = new URLSearchParams(window.location.hash.substring(1));
    const accessToken = params.get("access_token");

    const form = document.getElementById("reset-form");
    const message = document.getElementById("message");
    const submitButton = document.getElementById("submit-btn");

    function showMessage(text, type = "") {
      message.textContent = text;
      message.className = type;
    }

    if (!accessToken) {
      form.style.display = "none";
      showMessage(
        "This recovery link is invalid or has expired. Please request a new password reset link.",
        "error"
      );
    }

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("password-confirm").value;

      if (password.length < 8) {
        showMessage("Your password must contain at least 8 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("The passwords do not match.", "error");
        return;
      }

      submitButton.disabled = true;
      showMessage("Updating password...");

      try {
        const response = await fetch(
          `${SUPABASE_URL}/auth/v1/user`,
          {
            method: "PUT",
            headers: {
              "apikey": SUPABASE_PUBLISHABLE_KEY,
              "Authorization": `Bearer ${accessToken}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              password: password
            })
          }
        );

        if (!response.ok) {
          throw new Error("Password update failed.");
        }

        showMessage(
          "Password updated successfully. You can now return to the IEABank portal and sign in.",
          "success"
        );

        form.style.display = "none";
      } catch (error) {
        showMessage(
          "It was not possible to update the password. The link may have expired. Please request a new one.",
          "error"
        );
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
